services:

  # ─── parsedmarc ────────────────────────────────────────────────────
  parsedmarc:
    build: ./parsedmarc
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ─── Elasticsearch ─────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.7
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - cluster.name=parsedmarc
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=basic
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 10s
      timeout: 10s
      retries: 24

  # ─── Grafana ───────────────────────────────────────────────────────
  grafana:
    build: ./grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=elasticsearch
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "0.0.0.0:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  elasticsearch_data:
  grafana_data:
